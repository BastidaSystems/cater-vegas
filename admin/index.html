<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Panel administrativo de Cater Vegas." />
    <title>Cater Vegas | Admin</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <header class="admin-header">
      <a class="admin-logo" href="../index.html">CATER VEGAS</a>
      <nav>
        <a href="../index.html">Generador</a>
        <a href="../login.html">Login</a>
        <button id="signoutButton" type="button">Salir</button>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="admin-hero">
        <p class="admin-kicker">Supabase Admin</p>
        <h1>Eventos, planes y BEOFlow.</h1>
        <p id="sessionStatus">Verificando sesión...</p>
      </section>

      <section class="admin-grid">
        <form class="admin-card event-form" id="eventForm">
          <div>
            <p class="admin-kicker">Nuevo evento</p>
            <h2>Crear plan base</h2>
          </div>

          <label>
            Nombre del evento
            <input id="eventTitle" type="text" placeholder="Cena VIP en Las Vegas" required />
          </label>

          <label>
            Tipo
            <select id="eventType">
              <option>Boda</option>
              <option>Corporativo</option>
              <option>VIP</option>
            </select>
          </label>

          <label>
            Presupuesto
            <select id="eventBudget">
              <option value="$2K - $5K">Esencial · $2K - $5K</option>
              <option value="$5K - $10K" selected>Premium · $5K - $10K</option>
              <option value="$10K - $25K">Completo · $10K - $25K</option>
              <option value="$25K+">Luxury · $25K+</option>
            </select>
          </label>

          <label>
            Fecha tentativa
            <input id="eventDate" type="date" />
          </label>

          <label>
            Invitados
            <input id="guestCount" type="number" min="1" placeholder="80" />
          </label>

          <button class="primary-button" type="submit">Crear evento</button>
          <p class="admin-status" id="eventFormStatus" aria-live="polite"></p>
        </form>

        <section class="admin-card">
          <div class="events-heading">
            <div>
              <p class="admin-kicker">Realtime</p>
              <h2>Eventos</h2>
            </div>
            <button id="refreshEventsButton" type="button">Actualizar</button>
          </div>
          <div class="events-list" id="eventsList" aria-live="polite"></div>
        </section>

        <section class="admin-card collaborators-admin">
          <div class="events-heading">
            <div>
              <p class="admin-kicker">Collaborators</p>
              <h2>Equipo y asignaciones</h2>
            </div>
            <button id="refreshCollaboratorsButton" type="button">Actualizar</button>
          </div>

          <div class="collaborator-layout">
            <form class="collaborator-form" id="collaboratorForm">
              <input id="collaboratorId" type="hidden" />

              <label>
                Nombre
                <input id="collaboratorName" type="text" placeholder="Juan Perez" required />
              </label>

              <label>
                Email
                <input id="collaboratorEmail" type="email" placeholder="juan@example.com" />
              </label>

              <label>
                Teléfono
                <input id="collaboratorPhone" type="tel" placeholder="+1 702..." />
              </label>

              <label>
                Rol
                <select id="collaboratorRole">
                  <option value="owner">Owner</option>
                  <option value="admin">Admin</option>
                  <option value="organizer" selected>Organizer</option>
                  <option value="chef">Chef</option>
                  <option value="driver">Driver</option>
                  <option value="server">Server</option>
                  <option value="staff">Staff</option>
                  <option value="viewer">Viewer</option>
                </select>
              </label>

              <label>
                Status
                <select id="collaboratorStatus">
                  <option value="active" selected>Active</option>
                  <option value="invited">Invited</option>
                  <option value="inactive">Inactive</option>
                </select>
              </label>

              <label class="wide-field">
                Notas
                <textarea id="collaboratorNotes" rows="3" placeholder="Disponibilidad, función o instrucciones"></textarea>
              </label>

              <div class="form-actions">
                <button class="primary-button" type="submit">Guardar colaborador</button>
                <button class="secondary-button" id="resetCollaboratorButton" type="button">Limpiar</button>
              </div>

              <p class="admin-status" id="collaboratorFormStatus" aria-live="polite"></p>
            </form>

            <div class="collaborator-list" id="collaboratorsList" aria-live="polite"></div>
          </div>

          <div class="assignment-panel">
            <div>
              <p class="admin-kicker">Asignación</p>
              <h3>Asignar colaborador a evento</h3>
            </div>

            <form class="assignment-form" id="assignmentForm">
              <label>
                Evento
                <select id="assignmentEvent"></select>
              </label>

              <label>
                Colaborador
                <select id="assignmentCollaborator"></select>
              </label>

              <label>
                Rol en evento
                <select id="assignmentRole">
                  <option value="organizer" selected>Organizer</option>
                  <option value="chef">Chef</option>
                  <option value="driver">Driver</option>
                  <option value="server">Server</option>
                  <option value="staff">Staff</option>
                  <option value="viewer">Viewer</option>
                  <option value="admin">Admin</option>
                  <option value="owner">Owner</option>
                </select>
              </label>

              <label>
                Status
                <select id="assignmentStatus">
                  <option value="active" selected>Active</option>
                  <option value="invited">Invited</option>
                  <option value="inactive">Inactive</option>
                </select>
              </label>

              <label class="wide-field">
                Notas
                <input id="assignmentNotes" type="text" placeholder="Horario, punto de encuentro, responsabilidad" />
              </label>

              <button class="primary-button" type="submit">Asignar</button>
              <p class="admin-status" id="assignmentStatusText" aria-live="polite"></p>
            </form>

            <div class="assignment-list" id="assignmentsList" aria-live="polite"></div>
          </div>
        </section>

        <section class="admin-card beoflow-admin">
          <div>
            <p class="admin-kicker">BEOFlow</p>
            <h2>Actualizar plan</h2>
          </div>
          <p id="selectedEventLabel">Selecciona un evento para enviar instrucciones.</p>
          <form id="adminBeoflowForm">
            <textarea
              id="adminBeoflowPrompt"
              rows="5"
              placeholder="Ej. Agrega transporte, hospedaje y staff para un evento VIP."
            ></textarea>
            <button class="primary-button" type="submit">Enviar a BEOFlow</button>
          </form>
          <pre id="beoflowResult"></pre>
        </section>
      </section>
    </main>

    <script type="module" src="admin.js"></script>
  </body>
</html>
