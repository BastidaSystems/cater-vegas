<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login de Cater Vegas con Supabase Auth." />
    <title>Cater Vegas | Login</title>
    <link rel="stylesheet" href="styles.css?v=20260703-catering-fit-2" />
    <style>
      body {
        min-height: 100vh;
        min-height: 100svh;
        overflow: auto;
        background: var(--bone);
        color: var(--ink);
      }

      .auth-shell {
        display: grid;
        min-height: calc(100svh - 76px);
        place-items: center;
        padding: clamp(2rem, 5vw, 4.5rem) var(--page-gutter, clamp(20px, 5vw, 72px));
        background:
          radial-gradient(circle at 18% 12%, rgba(16, 21, 19, 0.05), transparent 25rem),
          linear-gradient(180deg, var(--bone-light) 0%, var(--bone) 100%);
      }

      .auth-panel {
        width: min(100%, 540px);
        border: 2px solid rgba(16, 21, 19, 0.88);
        border-radius: 30px;
        background: rgba(255, 253, 248, 0.92);
        box-shadow: 0 28px 80px rgba(55, 45, 32, 0.1);
        padding: clamp(1.4rem, 4vw, 2.5rem);
      }

      .auth-kicker {
        color: var(--ink);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.26em;
        text-transform: uppercase;
      }

      .auth-panel h1 {
        margin: 0.9rem 0 0;
        color: var(--ink);
        font-family: var(--serif);
        font-size: clamp(3.6rem, 11vw, 6.4rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 0.82;
      }

      .auth-panel p {
        margin: 1.1rem 0 0;
        color: #3f4843;
        font-family: var(--serif);
        font-size: clamp(1.08rem, 1.6vw, 1.35rem);
        line-height: 1.35;
      }

      .auth-form {
        display: grid;
        gap: 0.9rem;
        margin-top: 1.6rem;
      }

      .auth-form label {
        display: grid;
        gap: 0.44rem;
        color: var(--ink);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .auth-form input {
        width: 100%;
        border: 1px solid rgba(16, 21, 19, 0.18);
        border-radius: 999px;
        background: #fffefa;
        color: var(--ink);
        outline: 0;
        padding: 0.95rem 1rem;
        font: inherit;
      }

      .auth-form input:focus {
        border-color: var(--ink);
        box-shadow: 0 0 0 4px rgba(16, 21, 19, 0.06);
      }

      .auth-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-top: 0.35rem;
      }

      .auth-button {
        min-height: 48px;
        border: 1px solid var(--ink);
        border-radius: 999px;
        background: var(--ink);
        color: var(--bone-light);
        cursor: pointer;
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        padding: 0.9rem 1rem;
        text-transform: uppercase;
        transition: background 160ms ease, color 160ms ease, transform 160ms ease;
      }

      .auth-button:hover {
        transform: translateY(-1px);
      }

      .auth-button.secondary {
        background: transparent;
        color: var(--ink);
      }

      .auth-recover-link {
        justify-self: start;
        color: var(--ink);
        font-size: 0.9rem;
        font-weight: 800;
      }

      .auth-status {
        min-height: 1.25rem;
        color: #3f4843;
        font-size: 0.9rem;
      }

      .auth-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        margin-top: 1.25rem;
        align-items: center;
      }

      .auth-links a {
        border: 1px solid rgba(16, 21, 19, 0.18);
        border-radius: 999px;
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 900;
        padding: 0.65rem 0.9rem;
        text-transform: uppercase;
      }

      @media (max-width: 560px) {
        .auth-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header" id="top">
      <a class="brand" href="index.html#calendar" aria-label="Cater Vegas home">
        <span class="brand-mark">CV</span>
        <span class="brand-copy">
          <strong>Cater Vegas</strong>
          <small>Events &amp; Hospitality</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="Principal">
        <a href="index.html#about">About Us</a>
        <a href="index.html#contact">Contact</a>
        <a class="language-pill" href="index.html#contact">Language <strong>EN</strong></a>
      </nav>
    </header>

    <main class="auth-shell">
      <section class="auth-panel" aria-labelledby="auth-title">
        <span class="auth-kicker">Cater Vegas Access</span>
        <h1 id="auth-title">Acceso</h1>
        <p>Entra con tu cuenta para revisar el admin, colaboradores y solicitudes de Cater Vegas.</p>

        <form class="auth-form" id="authForm">
          <label>
            Email
            <input id="authEmail" type="email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input id="authPassword" type="password" autocomplete="current-password" />
          </label>

          <div class="auth-actions">
            <button class="auth-button" type="submit">Entrar</button>
            <button class="auth-button secondary" id="signupButton" type="button">Crear cuenta</button>
          </div>

          <button class="auth-button secondary" id="magicLinkButton" type="button">Enviar magic link</button>
          <a class="auth-recover-link" href="recover.html">Recuperar password</a>

          <p class="auth-status" id="authStatus" aria-live="polite"></p>
        </form>

        <nav class="auth-links" aria-label="Navegacion de sesion">
          <a href="admin/?preview=1">Ver admin preview</a>
          <a href="admin/">Admin</a>
          <a href="index.html#calendar">Volver</a>
          <button class="auth-button secondary" id="signoutButton" type="button">Salir</button>
        </nav>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
      import {
        isSupabaseConfigured,
        navigateWithLoopGuard,
        requireSupabase,
        resolvePostLoginPath,
      } from "./lib/supabaseClient.js?v=supabase-auth-loader-20260619";

      const authForm = document.querySelector("#authForm");
      const emailInput = document.querySelector("#authEmail");
      const passwordInput = document.querySelector("#authPassword");
      const signupButton = document.querySelector("#signupButton");
      const magicLinkButton = document.querySelector("#magicLinkButton");
      const signoutButton = document.querySelector("#signoutButton");
      const authStatus = document.querySelector("#authStatus");

      function setStatus(message) {
        authStatus.textContent = message;
      }

      const params = new URLSearchParams(window.location.search);
      if (params.get("password") === "updated") {
        setStatus("Password actualizada. Entra con tu nueva contraseña.");
      }

      if (!isSupabaseConfigured) {
        setStatus("Configura Supabase en lib/supabaseClient.js antes de usar Auth.");
      }

      const supabase = isSupabaseConfigured ? requireSupabase() : null;

      async function refreshSessionStatus() {
        if (!supabase) return;
        const { data } = await supabase.auth.getSession();
        if (data.session) {
          setStatus(`Sesion activa: ${data.session.user.email}`);
          try {
            const nextPath = await resolvePostLoginPath();
            navigateWithLoopGuard(nextPath, "login-session");
          } catch (routeError) {
            setStatus(routeError.message);
          }
        }
      }

      authForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!supabase) return;

        setStatus("Entrando...");
        const { error } = await supabase.auth.signInWithPassword({
          email: emailInput.value.trim(),
          password: passwordInput.value,
        });

        if (error) {
          setStatus(error.message);
          return;
        }

        try {
          const nextPath = await resolvePostLoginPath();
          navigateWithLoopGuard(nextPath, "login-submit");
        } catch (routeError) {
          setStatus(routeError.message);
        }
      });

      signupButton.addEventListener("click", () => {
        window.location.href = "create-account.html";
      });

      magicLinkButton.addEventListener("click", async () => {
        if (!supabase) return;

        setStatus("Enviando magic link...");
        const { error } = await supabase.auth.signInWithOtp({
          email: emailInput.value.trim(),
          options: {
            emailRedirectTo: new URL("login.html", window.location.href).href,
          },
        });

        setStatus(error ? error.message : "Magic link enviado.");
      });

      signoutButton.addEventListener("click", async () => {
        if (!supabase) return;
        await supabase.auth.signOut();
        setStatus("Sesion cerrada.");
      });

      refreshSessionStatus();
    </script>
  </body>
</html>
