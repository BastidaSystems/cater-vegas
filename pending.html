<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pending account approval in BEOFlow." />
    <title>BEOFlow | Pending</title>
    <link rel="stylesheet" href="style.css?v=scale-2" />
    <style>
      body {
        min-height: 100vh;
        min-height: 100svh;
        overflow: auto;
      }

      .pending-shell {
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        padding: clamp(5.5rem, 12vh, 8rem) var(--page-gutter) 3rem;
        background:
          linear-gradient(180deg, rgba(185, 144, 91, 0.11), transparent 34%),
          linear-gradient(145deg, #020202 0%, var(--black) 58%, #0a0a0a 100%);
      }

      .pending-panel {
        width: min(100%, 34rem);
        border: 1px solid rgba(185, 144, 91, 0.24);
        border-radius: 1.3rem;
        background: rgba(12, 12, 12, 0.88);
        box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.24);
        padding: clamp(1.4rem, 4vw, 2.3rem);
      }

      .pending-kicker {
        margin: 0;
        color: var(--gold-light);
        font-size: 0.68rem;
        font-weight: 900;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .pending-panel h1 {
        margin: 0.8rem 0 0;
        font-size: clamp(2.2rem, 8vw, 4.8rem);
        line-height: 0.9;
      }

      .pending-panel p {
        color: var(--muted);
        line-height: 1.6;
      }

      .pending-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.3rem;
      }

      .pending-actions a,
      .pending-actions button {
        appearance: none;
        background: transparent;
        border: 1px solid rgba(185, 144, 91, 0.32);
        border-radius: 999px;
        color: var(--gold-light);
        cursor: pointer;
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        padding: 0.85rem 1rem;
        text-transform: uppercase;
      }

      .pending-actions button:disabled {
        cursor: wait;
        opacity: 0.72;
      }
    </style>
  </head>
  <body>
    <header class="site-header" aria-label="Main header">
      <a class="logo" href="index.html" aria-label="Cater Vegas home">BEOFlow</a>
    </header>

    <main class="pending-shell">
      <section class="pending-panel" aria-labelledby="pending-title">
        <p class="pending-kicker">Request Received</p>
        <h1 id="pending-title">Pending</h1>
        <p id="pendingMessage">
          Your account is pending approval. A workspace admin must approve your access.
        </p>
        <div class="pending-actions">
          <button id="pendingSignoutButton" type="button">Sign Out & Login</button>
          <a href="index.html">Cater Vegas</a>
        </div>
      </section>
    </main>

    <script type="module">
      import {
        isSupabaseConfigured,
        navigateWithLoopGuard,
        requireSupabase,
        resolvePostLoginPath,
      } from "./lib/supabaseClient.js?v=shared-workspace-approval-20260707";

      const params = new URLSearchParams(window.location.search);
      const message = document.querySelector("#pendingMessage");
      const signoutButton = document.querySelector("#pendingSignoutButton");

      if (params.get("status") === "disabled") {
        message.textContent = "Your access is disabled. Contact the workspace admin.";
      } else if (params.get("confirm") === "1") {
        message.textContent = "Account created. Check your email, confirm the account, then sign in to open your portal.";
      }

      async function redirectIfAccessIsReady() {
        if (!isSupabaseConfigured || params.get("status") === "disabled") return;

        const supabase = requireSupabase();
        const { data, error } = await supabase.auth.getSession();
        if (error || !data?.session) return;

        const nextPath = await resolvePostLoginPath();
        if (!nextPath.startsWith("pending.html")) {
          navigateWithLoopGuard(nextPath, "pending-access-ready");
        }
      }

      signoutButton.addEventListener("click", async () => {
        signoutButton.disabled = true;
        signoutButton.textContent = "Signing out...";

        try {
          if (isSupabaseConfigured) {
            const supabase = requireSupabase();
            await supabase.auth.signOut();
          }
        } catch (error) {
          console.warn("Could not sign out of Supabase.", error);
        } finally {
          window.sessionStorage.removeItem("caterVegasRouteHistory");
          window.location.href = "login.html?signout=1";
        }
      });

      redirectIfAccessIsReady().catch((error) => {
        console.warn("No se pudo revisar el acceso de la cuenta.", error);
      });
    </script>
  </body>
</html>
