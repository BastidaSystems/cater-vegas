<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Crear cuenta de colaborador para Cater Vegas." />
    <title>Cater Vegas | Crear cuenta</title>
    <link rel="stylesheet" href="styles.css?v=20260703-catering-fit-2" />
    <style>
      body {
        min-height: 100vh;
        min-height: 100svh;
        overflow: auto;
        background: var(--bone);
        color: var(--ink);
      }

      .account-shell {
        min-height: calc(100svh - 76px);
        padding: clamp(2rem, 5vw, 4.5rem) var(--page-gutter, clamp(20px, 5vw, 72px));
        background:
          radial-gradient(circle at 18% 12%, rgba(16, 21, 19, 0.05), transparent 25rem),
          linear-gradient(180deg, var(--bone-light) 0%, var(--bone) 100%);
      }

      .account-wrap {
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(320px, 0.62fr);
        gap: clamp(1.25rem, 4vw, 3rem);
        width: min(1120px, 100%);
        margin: 0 auto;
        align-items: start;
      }

      .account-hero {
        display: grid;
        gap: 1.25rem;
        padding-top: clamp(0.8rem, 4vw, 2rem);
      }

      .account-kicker {
        margin: 0;
        color: var(--ink);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.26em;
        text-transform: uppercase;
      }

      .account-hero h1 {
        margin: 0;
        color: var(--ink);
        font-family: var(--serif);
        font-size: clamp(3.5rem, 9vw, 7.2rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 0.82;
      }

      .account-hero p,
      .account-card p,
      .account-status {
        color: #3f4843;
        font-family: var(--serif);
        font-size: clamp(1.08rem, 1.55vw, 1.35rem);
        line-height: 1.35;
      }

      .account-card,
      .account-form-panel {
        border: 2px solid rgba(16, 21, 19, 0.88);
        border-radius: 30px;
        background: rgba(255, 253, 248, 0.92);
        box-shadow: 0 28px 80px rgba(55, 45, 32, 0.1);
        padding: clamp(1.35rem, 3.2vw, 2rem);
      }

      .account-card {
        display: grid;
        gap: 0.9rem;
      }

      .account-card h2,
      .account-form-panel h2 {
        margin: 0;
        color: var(--ink);
        font-family: var(--serif);
        font-size: clamp(2.2rem, 4.4vw, 4rem);
        font-weight: 600;
        line-height: 0.9;
      }

      .account-card button,
      .account-button {
        min-height: 48px;
        border: 1px solid var(--ink);
        border-radius: 999px;
        background: var(--ink);
        color: var(--bone-light);
        cursor: pointer;
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        padding: 0.9rem 1rem;
        text-transform: uppercase;
      }

      .account-form-panel {
        display: grid;
        gap: 1.1rem;
      }

      .account-form {
        display: grid;
        gap: 0.85rem;
      }

      .account-form label {
        display: grid;
        gap: 0.42rem;
        color: var(--ink);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .account-form input {
        width: 100%;
        border: 1px solid rgba(16, 21, 19, 0.18);
        border-radius: 999px;
        background: #fffefa;
        color: var(--ink);
        outline: 0;
        padding: 0.95rem 1rem;
        font: inherit;
      }

      .account-form input:focus {
        border-color: var(--ink);
        box-shadow: 0 0 0 4px rgba(16, 21, 19, 0.06);
      }

      @media (max-width: 900px) {
        .account-wrap {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header" id="top">
      <a class="brand" href="index.html#calendar" aria-label="Cater Vegas home">
        <span class="brand-mark">CV</span>
        <span class="brand-copy">
          <strong>Cater Vegas</strong>
          <small>Events &amp; Hospitality</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="Principal">
        <a href="login.html">Login</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </header>

    <main class="account-shell">
      <div class="account-wrap">
        <section class="account-hero">
          <p class="account-kicker">Cater Vegas Team</p>
          <h1>Crear cuenta</h1>
          <p>Crea tu acceso al workspace de Cater Vegas como colaborador.</p>

          <article class="account-card is-selected" data-account-card="collaborator">
            <p class="account-kicker">Equipo</p>
            <h2>Soy colaborador</h2>
            <p>Entra al portal de colaborador para ver tu perfil y asignaciones del equipo.</p>
            <button type="button">Seleccionado</button>
          </article>
        </section>

        <section class="account-form-panel" aria-labelledby="account-form-title">
          <p class="account-kicker" id="accountTypeLabel">Collaborator access</p>
          <h2 id="account-form-title">Datos de la cuenta</h2>

          <form class="account-form" id="accountForm">
            <label>
              Nombre
              <input id="fullName" type="text" autocomplete="name" required />
            </label>

            <label>
              Email
              <input id="accountEmail" type="email" autocomplete="email" required />
            </label>

            <label>
              Password
              <input id="accountPassword" type="password" autocomplete="new-password" minlength="6" required />
            </label>

            <button class="account-button" type="submit">Crear cuenta</button>
            <p class="account-status" id="accountStatus" aria-live="polite"></p>
          </form>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
      import {
        DEFAULT_WORKSPACE_ID,
        isSupabaseConfigured,
        navigateWithLoopGuard,
        requireSupabase,
        resolvePostLoginPath,
      } from "./lib/supabaseClient.js?v=supabase-auth-loader-20260619";

      const form = document.querySelector("#accountForm");
      const fullName = document.querySelector("#fullName");
      const email = document.querySelector("#accountEmail");
      const password = document.querySelector("#accountPassword");
      const status = document.querySelector("#accountStatus");
      const accountType = "collaborator";
      const authConnectionMessage = "No se pudo conectar con Supabase. Revisa la URL del proyecto o tu conexion.";
      let supabase = null;

      function setStatus(message) {
        status.textContent = message;
      }

      function getAuthErrorMessage(error) {
        const message = error instanceof Error ? error.message : String(error || "");
        const normalized = message.toLowerCase();

        if (
          normalized.includes("load failed") ||
          normalized.includes("failed to fetch") ||
          normalized.includes("fetch failed") ||
          normalized.includes("networkerror") ||
          normalized.includes("could not be found")
        ) {
          return authConnectionMessage;
        }

        return message || "No se pudo completar la solicitud.";
      }

      try {
        supabase = isSupabaseConfigured ? requireSupabase() : null;
      } catch (error) {
        setStatus(getAuthErrorMessage(error));
      }

      async function upsertProfile(userId, workspaceId, role) {
        const { error } = await supabase.from("cater_profiles").upsert({
          id: userId,
          workspace_id: workspaceId,
          full_name: fullName.value.trim(),
          email: email.value.trim(),
          role,
        });

        if (error) throw error;
      }

      async function createWorkspaceAccess(user) {
        await upsertProfile(user.id, DEFAULT_WORKSPACE_ID, "collaborator_pending");
        const { error } = await supabase.from("beoflow_workspace_members").upsert(
          {
            workspace_id: DEFAULT_WORKSPACE_ID,
            user_id: user.id,
            role: "collaborator",
            status: "pending",
          },
          { onConflict: "workspace_id,user_id" }
        );

        if (error) throw error;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!supabase) {
          setStatus("Configura Supabase antes de crear cuentas.");
          return;
        }

        setStatus("Creando cuenta...");

        let data = null;
        let error = null;

        try {
          ({ data, error } = await supabase.auth.signUp({
            email: email.value.trim(),
            password: password.value,
            options: {
              data: {
                full_name: fullName.value.trim(),
                cater_role: "collaborator_pending",
                workspace_id: DEFAULT_WORKSPACE_ID,
                account_type: accountType,
              },
              emailRedirectTo: new URL("login.html", window.location.href).href,
            },
          }));
        } catch (requestError) {
          error = requestError;
        }

        if (error) {
          setStatus(getAuthErrorMessage(error));
          return;
        }

        if (data?.user && data.session) {
          try {
            await createWorkspaceAccess(data.user);
            const nextPath = await resolvePostLoginPath();
            window.setTimeout(() => {
              navigateWithLoopGuard(nextPath, "account-created");
            }, 500);
          } catch (requestError) {
            setStatus(getAuthErrorMessage(requestError));
          }
          return;
        }

        setStatus("Cuenta creada. Revisa tu correo si Supabase pide confirmacion y luego inicia sesion.");
        window.setTimeout(() => {
          window.location.href = "login.html?created=1";
        }, 900);
      });
    </script>
  </body>
</html>
