<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create a Cater Vegas owner account." />
    <title>Cater Vegas | Create Account</title>
    <link rel="stylesheet" href="styles.css?v=20260703-catering-fit-2" />
    <style>
      body {
        min-height: 100vh;
        min-height: 100svh;
        overflow: auto;
        overflow-x: hidden;
        background: #ffffff;
        color: var(--ink);
      }

      .account-shell {
        position: relative;
        isolation: isolate;
        display: grid;
        height: calc(100svh - 68px);
        min-height: calc(100svh - 68px);
        padding: clamp(1.45rem, 3.2vh, 2.6rem) clamp(1.5rem, 5vw, 5.5rem) clamp(2.75rem, 5vh, 3.75rem);
        overflow: hidden;
        background: #ffffff;
        place-items: center;
      }

      .account-shell::before {
        position: absolute;
        left: 0;
        bottom: 0;
        z-index: -2;
        width: min(44vw, 620px);
        height: min(48vh, 460px);
        content: "";
        background: url("assets/images/create-account-background.jpg") left bottom / cover no-repeat;
        opacity: 0.34;
        -webkit-mask-image:
          linear-gradient(90deg, #000 0%, rgba(0, 0, 0, 0.78) 42%, transparent 100%),
          linear-gradient(0deg, #000 0%, rgba(0, 0, 0, 0.88) 64%, transparent 100%);
        -webkit-mask-composite: source-in;
        mask-image:
          linear-gradient(90deg, #000 0%, rgba(0, 0, 0, 0.78) 42%, transparent 100%),
          linear-gradient(0deg, #000 0%, rgba(0, 0, 0, 0.88) 64%, transparent 100%);
        mask-composite: intersect;
      }

      .account-wrap {
        display: grid;
        grid-template-columns: minmax(0, 45fr) minmax(390px, 55fr);
        gap: clamp(3rem, 7vw, 7.5rem);
        width: min(1120px, 100%);
        margin: 0 auto;
        align-items: center;
      }

      .account-hero {
        display: grid;
        align-content: center;
        gap: clamp(0.9rem, 1.8vh, 1.25rem);
        min-height: 0;
      }

      .account-kicker {
        margin: 0;
        color: var(--gold);
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      .account-hero h1 {
        margin: 0;
        font-family: var(--serif);
        font-size: clamp(4.2rem, 7.4vw, 7.15rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 0.82;
        color: #090b0a;
      }

      .account-hero h1 span {
        display: block;
        color: var(--gold);
      }

      .account-line {
        width: 68px;
        height: 1px;
        background: var(--gold);
      }

      .account-copy {
        max-width: 25rem;
        margin: 0;
        color: #5f6762;
        font-size: clamp(0.98rem, 1.08vw, 1.12rem);
        line-height: 1.58;
      }

      .copy-soft-break {
        display: none;
      }

      .account-form-panel {
        justify-self: center;
        width: min(100%, 470px);
        border: 1px solid rgba(12, 14, 13, 0.06);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow:
          0 28px 76px rgba(16, 21, 19, 0.075),
          0 2px 12px rgba(16, 21, 19, 0.035);
        padding: clamp(1.65rem, 3vh, 2.55rem);
      }

      .account-form-panel h2 {
        margin: 0 0 1.25rem;
        color: #111412;
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .account-form {
        display: grid;
        gap: 0.78rem;
      }

      .field-group {
        display: grid;
        gap: 0.4rem;
      }

      .field-group > span,
      .field-label {
        color: #232726;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin: 0;
      }

      .field-shell {
        position: relative;
        display: flex;
        align-items: center;
      }

      .field-icon {
        position: absolute;
        left: 1.15rem;
        width: 18px;
        height: 18px;
        color: #a8aea9;
        pointer-events: none;
      }

      .account-form input:not(.password-toggle) {
        width: 100%;
        min-height: 54px;
        border: 1px solid rgba(16, 21, 19, 0.1);
        border-radius: 16px;
        background: #fbfbfa;
        color: var(--ink);
        outline: 0;
        padding: 0 3.6rem 0 3.05rem;
        font-family: var(--sans);
        font-size: 0.98rem;
        letter-spacing: 0;
        transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
      }

      .account-form input::placeholder {
        color: #b9beb9;
      }

      .account-form input:not(.password-toggle):focus {
        border-color: rgba(181, 154, 106, 0.62);
        background: #ffffff;
        box-shadow: 0 0 0 5px rgba(181, 154, 106, 0.1);
      }

      .secure-input {
        -webkit-text-security: disc;
      }

      .password-toggle {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .password-toggle:checked + .secure-input {
        -webkit-text-security: none;
      }

      .password-toggle-label {
        position: absolute;
        right: 0.95rem;
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 0;
        border-radius: 50%;
        color: #9ba19c;
        cursor: pointer;
        transition: color 180ms ease, background 180ms ease;
      }

      .password-toggle-label:hover {
        background: rgba(16, 21, 19, 0.045);
        color: #111412;
      }

      .password-toggle-label svg {
        width: 18px;
        height: 18px;
      }

      .account-button {
        min-height: 54px;
        margin-top: 0.2rem;
        border: 1px solid #090b0a;
        border-radius: 999px;
        background: #090b0a;
        color: #ffffff;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
      }

      .account-button:hover {
        background: #151817;
        box-shadow: 0 18px 34px rgba(16, 21, 19, 0.14);
        transform: translateY(-1px);
      }

      .account-signin {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.35rem;
        margin: 0.28rem 0 0;
        color: #838984;
        font-size: 0.88rem;
      }

      .account-signin a {
        color: #090b0a;
        font-weight: 700;
      }

      .account-status {
        min-height: 1rem;
        margin: 0.15rem 0 0;
        color: #5f6762;
        font-size: 0.88rem;
        line-height: 1.45;
        text-align: center;
      }

      .account-trust {
        position: absolute;
        left: 50%;
        bottom: clamp(0.85rem, 2vh, 1.35rem);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        width: min(780px, calc(100% - 3rem));
        color: #8d948f;
        transform: translateX(-50%);
      }

      .trust-item {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        min-width: 0;
        padding: 0 1.25rem;
        font-size: 0.78rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .trust-item + .trust-item {
        border-left: 1px solid rgba(16, 21, 19, 0.1);
      }

      .trust-item svg {
        width: 17px;
        height: 17px;
        color: var(--gold);
      }

      @media (max-width: 1080px) {
        .account-shell {
          padding-inline: clamp(1.5rem, 4vw, 3rem);
        }

        .account-wrap {
          grid-template-columns: minmax(0, 45fr) minmax(360px, 55fr);
          gap: clamp(2rem, 5vw, 4rem);
        }

        .account-hero h1 {
          font-size: clamp(4.1rem, 8vw, 6.4rem);
        }
      }

      @media (min-width: 821px) and (max-height: 820px) {
        .account-shell {
          padding-top: 1.05rem;
          padding-bottom: 2.45rem;
        }

        .account-shell::before {
          width: min(40vw, 560px);
          height: min(42vh, 400px);
        }

        .account-wrap {
          gap: clamp(2rem, 6vw, 5.75rem);
          width: min(1040px, 100%);
        }

        .account-hero {
          gap: 0.7rem;
        }

        .account-hero h1 {
          font-size: clamp(3.75rem, 6.8vw, 6.15rem);
          line-height: 0.83;
        }

        .account-copy {
          font-size: 0.96rem;
          line-height: 1.48;
        }

        .account-form-panel {
          width: min(100%, 450px);
          border-radius: 28px;
          padding: 1.5rem;
        }

        .account-form-panel h2 {
          margin-bottom: 0.9rem;
        }

        .account-form {
          gap: 0.56rem;
        }

        .field-group {
          gap: 0.28rem;
        }

        .account-form input:not(.password-toggle),
        .account-button {
          min-height: 48px;
          border-radius: 15px;
        }

        .account-signin {
          margin-top: 0.18rem;
          font-size: 0.82rem;
        }

        .account-status {
          min-height: 0.9rem;
          font-size: 0.82rem;
        }

        .account-trust {
          bottom: 0.6rem;
        }
      }

      @media (max-width: 820px) {
        .account-shell {
          height: auto;
          min-height: calc(100svh - 93px);
          padding-top: 16.75rem;
          padding-bottom: 3rem;
        }

        .account-shell::before {
          top: 0;
          bottom: auto;
          width: 100%;
          height: 15rem;
          opacity: 0.46;
          background-position: left top;
          -webkit-mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.76) 46%, transparent 100%);
          mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.76) 46%, transparent 100%);
        }

        .account-wrap {
          grid-template-columns: 1fr;
          gap: 2.35rem;
        }

        .account-hero {
          min-height: auto;
          gap: 1rem;
        }

        .account-hero h1 {
          font-size: clamp(4.2rem, 17vw, 6.4rem);
        }

        .account-copy {
          max-width: 31rem;
        }

        .account-form-panel {
          width: 100%;
        }

        .account-trust {
          position: static;
          flex-wrap: wrap;
          width: 100%;
          margin: 2rem auto 0;
          transform: none;
        }

        .trust-item {
          padding: 0.45rem 0.9rem;
        }
      }

      @media (max-width: 560px) {
        .site-header {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 8px;
          width: 100vw;
          max-width: 100vw;
          padding-inline: 12px;
          overflow: visible;
        }

        .brand {
          gap: 8px;
          min-width: 0;
          overflow: hidden;
        }

        .brand-copy {
          display: none;
        }

        .site-nav {
          position: fixed;
          top: 27px;
          right: 12px;
          z-index: 30;
          gap: 0;
          justify-self: end;
          font-size: 0.76rem;
          white-space: nowrap;
        }

        .site-nav a {
          padding-inline: 7px;
        }

        .account-shell {
          max-width: 100vw;
          padding-inline: 1rem;
          overflow-x: hidden;
        }

        .copy-soft-break {
          display: block;
        }

        .account-form-panel {
          border-radius: 28px;
          padding: 1.45rem;
        }

        .account-form input:not(.password-toggle),
        .account-button {
          min-height: 58px;
        }

        .trust-item {
          width: 100%;
          padding: 0.65rem 0;
        }

        .trust-item + .trust-item {
          border-left: 0;
          border-top: 1px solid rgba(16, 21, 19, 0.1);
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header" id="top">
      <a class="brand" href="index.html#calendar" aria-label="Cater Vegas home">
        <span class="brand-mark">CV</span>
        <span class="brand-copy">
          <strong>Cater Vegas</strong>
          <small>Events &amp; Hospitality</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="login.html">Login</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </header>

    <main class="account-shell">
      <div class="account-wrap">
        <section class="account-hero">
          <p class="account-kicker">Welcome to Cater Vegas</p>
          <h1>Create <span>Account</span></h1>
          <div class="account-line" aria-hidden="true"></div>
          <p class="account-copy">Create your account to start planning <br class="copy-soft-break" />extraordinary events with Cater Vegas.</p>
        </section>

        <section class="account-form-panel" aria-labelledby="account-form-title">
          <h2 id="account-form-title">New Account</h2>

          <form class="account-form" id="accountForm">
            <label class="field-group">
              <span>Name</span>
              <span class="field-shell">
                <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M20 21a8 8 0 0 0-16 0" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                  <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.7" />
                </svg>
                <input id="fullName" type="text" autocomplete="name" placeholder="Full name" required />
              </span>
            </label>

            <label class="field-group">
              <span>Email</span>
              <span class="field-shell">
                <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3.5" y="5.5" width="17" height="13" rx="2.4" fill="none" stroke="currentColor" stroke-width="1.7" />
                  <path d="m5 8 7 5 7-5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <input id="accountEmail" type="email" autocomplete="email" placeholder="email@example.com" required />
              </span>
            </label>

            <div class="field-group">
              <label class="field-label" for="accountPassword">Password</label>
              <span class="field-shell">
                <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="10" width="14" height="10" rx="2.4" fill="none" stroke="currentColor" stroke-width="1.7" />
                  <path d="M8 10V7.8a4 4 0 0 1 8 0V10" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                </svg>
                <input class="password-toggle" id="showAccountPassword" type="checkbox" aria-label="Show password" />
                <input class="secure-input" id="accountPassword" type="text" autocomplete="new-password" minlength="6" placeholder="Create password" required />
                <label class="password-toggle-label" for="showAccountPassword" aria-label="Show password">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2.8 12s3.4-5.4 9.2-5.4S21.2 12 21.2 12s-3.4 5.4-9.2 5.4S2.8 12 2.8 12Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="12" cy="12" r="2.7" fill="none" stroke="currentColor" stroke-width="1.7" />
                  </svg>
                </label>
              </span>
            </div>

            <div class="field-group">
              <label class="field-label" for="confirmPassword">Confirm Password</label>
              <span class="field-shell">
                <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="10" width="14" height="10" rx="2.4" fill="none" stroke="currentColor" stroke-width="1.7" />
                  <path d="M8 10V7.8a4 4 0 0 1 8 0V10" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                </svg>
                <input class="password-toggle" id="showConfirmPassword" type="checkbox" aria-label="Show password confirmation" />
                <input class="secure-input" id="confirmPassword" type="text" autocomplete="new-password" minlength="6" placeholder="Repeat password" required />
                <label class="password-toggle-label" for="showConfirmPassword" aria-label="Show password confirmation">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2.8 12s3.4-5.4 9.2-5.4S21.2 12 21.2 12s-3.4 5.4-9.2 5.4S2.8 12 2.8 12Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="12" cy="12" r="2.7" fill="none" stroke="currentColor" stroke-width="1.7" />
                  </svg>
                </label>
              </span>
            </div>

            <button class="account-button" type="submit">Create Account</button>
            <p class="account-signin">Already have an account? <a href="login.html">Sign In</a></p>
            <p class="account-status" id="accountStatus" aria-live="polite"></p>
          </form>
        </section>
      </div>

      <div class="account-trust" aria-label="Account support details">
        <span class="trust-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.2 19 6v5.4c0 4.2-2.8 7.7-7 9.4-4.2-1.7-7-5.2-7-9.4V6l7-2.8Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
            <path d="m9.2 12 2 2 4-4.2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Secure &amp; Trusted
        </span>
        <span class="trust-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="8.2" fill="none" stroke="currentColor" stroke-width="1.7" />
            <path d="M12 7.8V12l3 2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Fast Planning
        </span>
        <span class="trust-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 13v-1a7 7 0 0 1 14 0v1" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
            <path d="M5 13h2.1c.8 0 1.4.6 1.4 1.4v2.2c0 .8-.6 1.4-1.4 1.4H5v-5Zm14 0h-2.1c-.8 0-1.4.6-1.4 1.4v2.2c0 .8.6 1.4 1.4 1.4H19v-5Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
            <path d="M15 19.2c-.8.4-1.8.6-3 .6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
          </svg>
          Personal Support
        </span>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
      import {
        isSupabaseConfigured,
        navigateWithLoopGuard,
        requireSupabase,
        resolvePostLoginPath,
      } from "./lib/supabaseClient.js?v=workspace-connection-20260707";

      const form = document.querySelector("#accountForm");
      const fullName = document.querySelector("#fullName");
      const email = document.querySelector("#accountEmail");
      const password = document.querySelector("#accountPassword");
      const status = document.querySelector("#accountStatus");
      const accountType = "owner";
      const ownerWorkspaceId = createOwnerWorkspaceId();
      const authConnectionMessage = "Could not connect to Supabase. Check the project URL or your connection.";
      let supabase = null;

      function createOwnerWorkspaceId() {
        const id =
          globalThis.crypto && typeof globalThis.crypto.randomUUID === "function"
            ? globalThis.crypto.randomUUID()
            : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
        return `cater-vegas-${id}`.toLowerCase();
      }

      function setStatus(message) {
        status.textContent = message;
      }

      function getAuthErrorMessage(error) {
        const message = error instanceof Error ? error.message : String(error || "");
        const normalized = message.toLowerCase();

        if (
          normalized.includes("load failed") ||
          normalized.includes("failed to fetch") ||
          normalized.includes("fetch failed") ||
          normalized.includes("networkerror") ||
          normalized.includes("could not be found")
        ) {
          return authConnectionMessage;
        }

        return message || "Could not complete the request.";
      }

      try {
        supabase = isSupabaseConfigured ? requireSupabase() : null;
      } catch (error) {
        setStatus(getAuthErrorMessage(error));
      }

      async function upsertProfile(userId, workspaceId, role) {
        const { error } = await supabase.from("cater_profiles").upsert({
          id: userId,
          workspace_id: workspaceId,
          full_name: fullName.value.trim(),
          email: email.value.trim(),
          role,
        });

        if (error) throw error;
      }

      async function createWorkspaceAccess(user) {
        await upsertProfile(user.id, ownerWorkspaceId, "owner");
        const { error } = await supabase.from("beoflow_workspace_members").upsert(
          {
            workspace_id: ownerWorkspaceId,
            user_id: user.id,
            role: "owner",
            status: "active",
          },
          { onConflict: "workspace_id,user_id" }
        );

        if (error) throw error;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!supabase) {
          setStatus("Configure Supabase before creating accounts.");
          return;
        }

        setStatus("Creating account...");

        let data = null;
        let error = null;

        try {
          ({ data, error } = await supabase.auth.signUp({
            email: email.value.trim(),
            password: password.value,
            options: {
              data: {
                full_name: fullName.value.trim(),
                cater_role: "owner",
                workspace_id: ownerWorkspaceId,
                workspace_name: `${fullName.value.trim() || "Cater Vegas"} Workspace`,
                account_type: accountType,
              },
              emailRedirectTo: new URL("login.html", window.location.href).href,
            },
          }));
        } catch (requestError) {
          error = requestError;
        }

        if (error) {
          setStatus(getAuthErrorMessage(error));
          return;
        }

        if (data?.user && data.session) {
          try {
            await createWorkspaceAccess(data.user);
            const nextPath = await resolvePostLoginPath();
            window.setTimeout(() => {
              navigateWithLoopGuard(nextPath, "account-created");
            }, 500);
          } catch (requestError) {
            setStatus(getAuthErrorMessage(requestError));
          }
          return;
        }

        setStatus("Account created. Check your email if Supabase requires confirmation, then sign in.");
        window.setTimeout(() => {
          window.location.href = "login.html?created=1";
        }, 900);
      });
    </script>
  </body>
</html>
