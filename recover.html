<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Recover Cater Vegas access with Supabase Auth." />
    <title>Cater Vegas | Recover Access</title>
    <link rel="stylesheet" href="style.css?v=scale-2" />
    <style>
      body {
        min-height: 100vh;
        min-height: 100svh;
        overflow: auto;
      }

      .auth-shell {
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        padding: clamp(5.5rem, 12vh, 8rem) var(--page-gutter) 3rem;
        background:
          linear-gradient(180deg, rgba(185, 144, 91, 0.11), transparent 34%),
          linear-gradient(145deg, #020202 0%, var(--black) 58%, #0a0a0a 100%);
      }

      .auth-panel {
        width: min(100%, 28rem);
        border: 1px solid rgba(185, 144, 91, 0.24);
        border-radius: 1.4rem;
        background: rgba(5, 5, 5, 0.82);
        box-shadow: 0 2rem 5rem rgba(0, 0, 0, 0.36);
        padding: clamp(1.5rem, 4vw, 2.35rem);
      }

      .auth-kicker {
        color: var(--gold-light);
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .auth-panel h1 {
        margin-top: 0.85rem;
        font-size: clamp(2.1rem, 9vw, 4rem);
        line-height: 0.9;
        letter-spacing: 0.03em;
      }

      .auth-panel p {
        margin-top: 1rem;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
      }

      .auth-form {
        display: grid;
        gap: 0.85rem;
        margin-top: 1.6rem;
      }

      .auth-form + .auth-form {
        margin-top: 1.2rem;
        padding-top: 1.2rem;
        border-top: 1px solid rgba(185, 144, 91, 0.18);
      }

      .auth-form label {
        display: grid;
        gap: 0.42rem;
        color: rgba(245, 241, 234, 0.76);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .auth-form input {
        width: 100%;
        border: 1px solid rgba(185, 144, 91, 0.26);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.045);
        color: var(--text);
        outline: 0;
        padding: 0.94rem 1rem;
      }

      .auth-button {
        border-radius: 999px;
        background: var(--gold);
        color: #050505;
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        padding: 0.9rem 1rem;
        text-transform: uppercase;
      }

      .auth-button.secondary {
        border: 1px solid rgba(185, 144, 91, 0.32);
        background: transparent;
        color: var(--gold-light);
      }

      .auth-status {
        min-height: 1.25rem;
        color: var(--gold-light);
        font-size: 0.8rem;
      }

      .auth-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.9rem;
        margin-top: 1.25rem;
        color: var(--gold-light);
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <header class="site-header" aria-label="Main header">
      <a class="logo" href="index.html" aria-label="Cater Vegas home">CATER VEGAS</a>
    </header>

    <main class="auth-shell">
      <section class="auth-panel" aria-labelledby="recover-title">
        <span class="auth-kicker">Supabase Auth</span>
        <h1 id="recover-title">Recover</h1>
        <p>
          Request a link to recover access. When you open the email link,
          return to this page and save a new password.
        </p>

        <form class="auth-form" id="recoverRequestForm">
          <label>
            Email
            <input id="recoverEmail" type="email" autocomplete="email" required />
          </label>
          <button class="auth-button" type="submit">Send Recovery</button>
        </form>

        <form class="auth-form" id="newPasswordForm">
          <label>
            New password
            <input
              id="newPassword"
              type="password"
              autocomplete="new-password"
              minlength="8"
              required
            />
          </label>
          <label>
            Confirm password
            <input
              id="confirmPassword"
              type="password"
              autocomplete="new-password"
              minlength="8"
              required
            />
          </label>
          <button class="auth-button secondary" type="submit">Save Password</button>
          <p class="auth-status" id="recoverStatus" aria-live="polite"></p>
        </form>

        <nav class="auth-links" aria-label="Session navigation">
          <a href="login.html">Back to login</a>
          <a href="index.html">Back to builder</a>
        </nav>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
      import { isSupabaseConfigured, requireSupabase } from "./lib/supabaseClient.js?v=shared-marketplace-workspace-20260707";

      const recoverRequestForm = document.querySelector("#recoverRequestForm");
      const newPasswordForm = document.querySelector("#newPasswordForm");
      const recoverEmail = document.querySelector("#recoverEmail");
      const newPassword = document.querySelector("#newPassword");
      const confirmPassword = document.querySelector("#confirmPassword");
      const recoverStatus = document.querySelector("#recoverStatus");
      const authConnectionMessage = "Could not connect to Supabase. Check the project URL or your connection.";
      let supabase = null;

      function setStatus(message) {
        recoverStatus.textContent = message;
      }

      function getAuthErrorMessage(error) {
        const message = error instanceof Error ? error.message : String(error || "");
        const normalized = message.toLowerCase();

        if (
          normalized.includes("load failed") ||
          normalized.includes("failed to fetch") ||
          normalized.includes("fetch failed") ||
          normalized.includes("networkerror") ||
          normalized.includes("could not be found")
        ) {
          return authConnectionMessage;
        }

        return message || "Could not complete the request.";
      }

      if (!isSupabaseConfigured) {
        setStatus("Configure Supabase in lib/supabaseClient.js before using recovery.");
      }

      try {
        supabase = isSupabaseConfigured ? requireSupabase() : null;
      } catch (error) {
        setStatus(getAuthErrorMessage(error));
      }

      async function showRecoveryState() {
        if (!supabase) return;
        try {
          const { data, error } = await supabase.auth.getSession();
          if (error) throw error;
          if (data?.session) {
            setStatus("Link validated. Enter a new password.");
            newPassword.focus();
            return;
          }

          if (window.location.hash || window.location.search.includes("type=recovery")) {
            setStatus("Open the recovery link again or request another email.");
          }
        } catch (error) {
          setStatus(getAuthErrorMessage(error));
        }
      }

      recoverRequestForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!supabase) return;

        setStatus("Sending recovery...");
        let error = null;
        try {
          ({ error } = await supabase.auth.resetPasswordForEmail(recoverEmail.value.trim(), {
            redirectTo: new URL("recover.html", window.location.href).href,
          }));
        } catch (requestError) {
          error = requestError;
        }

        setStatus(error ? getAuthErrorMessage(error) : "Recovery sent. Check your email.");
      });

      newPasswordForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!supabase) return;

        if (newPassword.value !== confirmPassword.value) {
          setStatus("Passwords do not match.");
          return;
        }

        setStatus("Saving password...");
        let data = null;
        try {
          ({ data } = await supabase.auth.getSession());
        } catch (error) {
          setStatus(getAuthErrorMessage(error));
          return;
        }
        if (!data?.session) {
          setStatus("Open the recovery link from the email first.");
          return;
        }

        let error = null;
        try {
          ({ error } = await supabase.auth.updateUser({
            password: newPassword.value,
          }));
        } catch (requestError) {
          error = requestError;
        }

        if (error) {
          setStatus(getAuthErrorMessage(error));
          return;
        }

        try {
          await supabase.auth.signOut();
          window.location.href = "login.html?password=updated";
        } catch (requestError) {
          setStatus(getAuthErrorMessage(requestError));
        }
      });

      showRecoveryState();
    </script>
  </body>
</html>
