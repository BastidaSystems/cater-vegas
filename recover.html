<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Recuperar acceso de Cater Vegas con Supabase Auth." />
    <title>Cater Vegas | Recuperar acceso</title>
    <link rel="stylesheet" href="style.css?v=scale-2" />
    <style>
      body {
        min-height: 100vh;
        min-height: 100svh;
        overflow: auto;
      }

      .auth-shell {
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        padding: clamp(5.5rem, 12vh, 8rem) var(--page-gutter) 3rem;
        background:
          linear-gradient(180deg, rgba(185, 144, 91, 0.11), transparent 34%),
          linear-gradient(145deg, #020202 0%, var(--black) 58%, #0a0a0a 100%);
      }

      .auth-panel {
        width: min(100%, 28rem);
        border: 1px solid rgba(185, 144, 91, 0.24);
        border-radius: 1.4rem;
        background: rgba(5, 5, 5, 0.82);
        box-shadow: 0 2rem 5rem rgba(0, 0, 0, 0.36);
        padding: clamp(1.5rem, 4vw, 2.35rem);
      }

      .auth-kicker {
        color: var(--gold-light);
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .auth-panel h1 {
        margin-top: 0.85rem;
        font-size: clamp(2.1rem, 9vw, 4rem);
        line-height: 0.9;
        letter-spacing: 0.03em;
      }

      .auth-panel p {
        margin-top: 1rem;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
      }

      .auth-form {
        display: grid;
        gap: 0.85rem;
        margin-top: 1.6rem;
      }

      .auth-form + .auth-form {
        margin-top: 1.2rem;
        padding-top: 1.2rem;
        border-top: 1px solid rgba(185, 144, 91, 0.18);
      }

      .auth-form label {
        display: grid;
        gap: 0.42rem;
        color: rgba(245, 241, 234, 0.76);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .auth-form input {
        width: 100%;
        border: 1px solid rgba(185, 144, 91, 0.26);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.045);
        color: var(--text);
        outline: 0;
        padding: 0.94rem 1rem;
      }

      .auth-button {
        border-radius: 999px;
        background: var(--gold);
        color: #050505;
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        padding: 0.9rem 1rem;
        text-transform: uppercase;
      }

      .auth-button.secondary {
        border: 1px solid rgba(185, 144, 91, 0.32);
        background: transparent;
        color: var(--gold-light);
      }

      .auth-status {
        min-height: 1.25rem;
        color: var(--gold-light);
        font-size: 0.8rem;
      }

      .auth-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.9rem;
        margin-top: 1.25rem;
        color: var(--gold-light);
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <header class="site-header" aria-label="Encabezado principal">
      <a class="logo" href="index.html" aria-label="Cater Vegas inicio">CATER VEGAS</a>
    </header>

    <main class="auth-shell">
      <section class="auth-panel" aria-labelledby="recover-title">
        <span class="auth-kicker">Supabase Auth</span>
        <h1 id="recover-title">Recover</h1>
        <p>
          Pide un link para recuperar acceso. Al abrir el link del correo,
          regresa a esta página y guarda una contraseña nueva.
        </p>

        <form class="auth-form" id="recoverRequestForm">
          <label>
            Email
            <input id="recoverEmail" type="email" autocomplete="email" required />
          </label>
          <button class="auth-button" type="submit">Enviar recovery</button>
        </form>

        <form class="auth-form" id="newPasswordForm">
          <label>
            Nueva password
            <input
              id="newPassword"
              type="password"
              autocomplete="new-password"
              minlength="8"
              required
            />
          </label>
          <label>
            Confirmar password
            <input
              id="confirmPassword"
              type="password"
              autocomplete="new-password"
              minlength="8"
              required
            />
          </label>
          <button class="auth-button secondary" type="submit">Guardar password</button>
          <p class="auth-status" id="recoverStatus" aria-live="polite"></p>
        </form>

        <nav class="auth-links" aria-label="Navegación de sesión">
          <a href="login.html">Volver al login</a>
          <a href="index.html">Volver al generador</a>
        </nav>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
      import { isSupabaseConfigured, requireSupabase } from "./lib/supabaseClient.js?v=supabase-auth-loader-20260619";

      const recoverRequestForm = document.querySelector("#recoverRequestForm");
      const newPasswordForm = document.querySelector("#newPasswordForm");
      const recoverEmail = document.querySelector("#recoverEmail");
      const newPassword = document.querySelector("#newPassword");
      const confirmPassword = document.querySelector("#confirmPassword");
      const recoverStatus = document.querySelector("#recoverStatus");
      const supabase = isSupabaseConfigured ? requireSupabase() : null;

      function setStatus(message) {
        recoverStatus.textContent = message;
      }

      if (!isSupabaseConfigured) {
        setStatus("Configura Supabase en lib/supabaseClient.js antes de usar recovery.");
      }

      async function showRecoveryState() {
        if (!supabase) return;
        const { data } = await supabase.auth.getSession();
        if (data.session) {
          setStatus("Link validado. Escribe una password nueva.");
          newPassword.focus();
          return;
        }

        if (window.location.hash || window.location.search.includes("type=recovery")) {
          setStatus("Abre de nuevo el link de recovery o pide otro correo.");
        }
      }

      recoverRequestForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!supabase) return;

        setStatus("Enviando recovery...");
        const { error } = await supabase.auth.resetPasswordForEmail(recoverEmail.value.trim(), {
          redirectTo: new URL("recover.html", window.location.href).href,
        });

        setStatus(error ? error.message : "Recovery enviado. Revisa el correo.");
      });

      newPasswordForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!supabase) return;

        if (newPassword.value !== confirmPassword.value) {
          setStatus("Las passwords no coinciden.");
          return;
        }

        setStatus("Guardando password...");
        const { data } = await supabase.auth.getSession();
        if (!data.session) {
          setStatus("Primero abre el link de recovery desde el correo.");
          return;
        }

        const { error } = await supabase.auth.updateUser({
          password: newPassword.value,
        });

        if (error) {
          setStatus(error.message);
          return;
        }

        await supabase.auth.signOut();
        window.location.href = "login.html?password=updated";
      });

      showRecoveryState();
    </script>
  </body>
</html>
